name: personal-site

services:
  web:
    image: ${SITE_IMAGE:-ghcr.io/arielmalada/personal:edge}
    restart: unless-stopped
    ports:
      - '${SITE_BIND:-0.0.0.0}:${SITE_PORT:-8080}:8080'
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=16m,uid=101,gid=101,mode=0755
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    stop_grace_period: 10s
